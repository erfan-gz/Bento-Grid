<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./Source/Css/style.css">
    <link rel="stylesheet" href="./Source/Css/Normilize.css">
    <link rel="shortcut icon" href="./Source/Imgs/favicon-32x32.png" type="image/x-icon">
    <title>Bento grid</title>
</head>
<body>
    

    <div class="container">
        <div class="flex-section">
            <div class="flex-item f-item1">
                <div class="text1">Create and schedule content <span>quicker.</span></div>
                <div class="button">
                    <img src="./Source/Imgs/illustration-create-post.webp" alt="" >
                </div>
            </div>
            <div class="flex-item f-item2">
                <div class="text2">Write your content using AI.</div>
                <div class="box2"><img src="./Source/Imgs/illustration-ai-content.webp" alt=""></div>
            </div>
        </div>
        <div class="grid-section">
            <div class="grid-item g-item1">
                <div class="g-text1">Social Media <span>10x</span> Faster with AI</div>
                <div class="star"><img src="./Source/Imgs/illustration-five-stars.webp" alt=""></div>
                <div class="g-bottom">Over 4,000 5-star reviews</div>
            </div>
            <div class="grid-item g-item2">
                <div class="head-text2">Schedule to social media</div>
                <div class="image2"><img src="./Source/Imgs/illustration-schedule-posts.webp" alt=""></div>
                <div class="bottom-text2">Optimize post timings to publish content at the perfect time for your audience.</div>
            </div>
            <div class="grid-item g-item3">3</div>
            <div class="grid-item g-item4">4</div>
            <div class="grid-item g-item5">5</div>
            <div class="grid-item g-item6">6</div>
        </div>
    </div>





</body>
</html>
